<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TalentTrace</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060910;
  --surface: #0d1424;
  --surface2: #111c30;
  --surface3: #162038;
  --accent: #4fffb0;
  --accent2: #00cfff;
  --accent-glow: rgba(79,255,176,0.12);
  --ai: #c084fc;
  --ai-glow: rgba(192,132,252,0.1);
  --warn: #ffb340;
  --danger: #ff6b6b;
  --green: #22c55e;
  --text: #dce8f5;
  --muted: #4d6480;
  --border: #1a2d47;
  --border2: #1f3555;
  --r: 13px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 70% 40% at 5% 0%,rgba(79,255,176,0.05) 0%,transparent 55%),
    radial-gradient(ellipse 50% 50% at 95% 95%,rgba(0,207,255,0.04) 0%,transparent 55%);
  color:var(--text);
  font-family:'Epilogue',sans-serif;
  min-height:100vh;
  padding-bottom:80px;
}

/* ── NAV ── */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 36px;
  border-bottom:1px solid var(--border);
  background:rgba(6,9,16,0.9);
  backdrop-filter:blur(14px);
  position:sticky;top:0;z-index:200;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:8px;display:grid;place-items:center;font-size:17px;
}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:-0.3px;}
.brand-name span{color:var(--accent);}
.nav-pill{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:3px 10px;background:var(--ai-glow);
  border:1px solid rgba(192,132,252,0.25);color:var(--ai);
  border-radius:20px;letter-spacing:0.5px;
}

/* ── TABS ── */
.tabs{
  display:flex;gap:2px;padding:24px 36px 0;
  border-bottom:1px solid var(--border);
  overflow-x:auto;
}
.tab{
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  padding:10px 16px;border-radius:8px 8px 0 0;
  border:1px solid transparent;border-bottom:none;
  cursor:pointer;color:var(--muted);background:transparent;
  transition:all 0.2s;display:flex;align-items:center;gap:7px;
  position:relative;bottom:-1px;white-space:nowrap;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);background:var(--surface);border-color:var(--border);border-bottom-color:var(--surface);}


/* ── PANELS ── */
.panel{display:none;padding:28px 36px;animation:fadeUp 0.3s ease;}
.panel.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── LAYOUT ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:760px){
  .grid-2{grid-template-columns:1fr;}
  .tabs,.panel{padding-left:16px;padding-right:16px;}
  nav{padding:12px 16px;}
}

/* ── CARDS ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:20px;transition:border-color 0.2s;
}
.card:hover{border-color:var(--border2);}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:18px;}
.card-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;box-shadow:0 0 6px var(--accent);}
.card-title{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:2px;}

/* ── FORM ── */
label{display:block;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;}
select,input[type=text],input:not([type]),input[type=number]{
  width:100%;padding:9px 12px;margin-bottom:14px;
  border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);
  font-family:'Epilogue',sans-serif;font-size:13px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;-webkit-appearance:none;
}
select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
textarea.form-area{
  width:100%;padding:10px 12px;margin-bottom:14px;
  border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);
  font-family:'Epilogue',sans-serif;font-size:13px;outline:none;
  resize:vertical;min-height:70px;
  transition:border-color 0.2s;
}
textarea.form-area:focus{border-color:var(--accent);}
.exp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:10px 18px;border-radius:9px;border:none;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  transition:all 0.2s;letter-spacing:0.3px;white-space:nowrap;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#060910;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(79,255,176,0.25);}
.btn-linkedin{background:#0a66c2;color:white;}
.btn-linkedin:hover{background:#0958a8;transform:translateY(-2px);}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--accent2);color:var(--accent2);transform:translateY(-2px);}
.btn-ai{background:linear-gradient(135deg,#c084fc,#818cf8);color:white;}
.btn-ai:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,132,252,0.3);}
.btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(255,107,107,0.3);}
.btn-danger:hover{background:rgba(255,107,107,0.08);border-color:var(--danger);}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:none!important;}

/* ── OUTPUT BOXES ── */
.out-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.out-head{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);}
.out-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1.2px;}
.out-area{width:100%;padding:14px 16px;background:transparent;border:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.8;resize:vertical;min-height:90px;outline:none;}
.copy-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:4px 10px;font-size:10px;font-weight:600;border-radius:6px;cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.2s;}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.copy-btn.copied{border-color:var(--green);color:var(--green);}

/* ── STATUS ── */
.status{padding:8px 12px;border-radius:8px;font-size:11px;font-weight:500;margin-top:8px;display:none;align-items:center;gap:6px;line-height:1.5;}
.status.info{background:rgba(0,207,255,0.07);color:var(--accent2);border:1px solid rgba(0,207,255,0.18);display:flex;}
.status.success{background:rgba(34,197,94,0.07);color:var(--green);border:1px solid rgba(34,197,94,0.18);display:flex;}
.status.error{background:rgba(255,107,107,0.07);color:var(--danger);border:1px solid rgba(255,107,107,0.18);display:flex;}
.status.warn{background:rgba(255,179,64,0.07);color:var(--warn);border:1px solid rgba(255,179,64,0.18);display:flex;}

/* ── SPINNER ── */
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:currentColor;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
.spinner.on{display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:20px 0;}

/* ════════════════════════════
   CUSTOM ROLES MODAL
════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(6,9,16,0.85);
  backdrop-filter:blur(8px);z-index:500;
  display:none;place-items:center;padding:20px;
}
.modal-overlay.open{display:grid;}
.modal{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;padding:28px;width:100%;max-width:520px;
  max-height:90vh;overflow-y:auto;
  animation:fadeUp 0.25s ease;
}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text);}
.modal-close{background:transparent;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:grid;place-items:center;transition:all 0.2s;}
.modal-close:hover{border-color:var(--danger);color:var(--danger);}

/* Saved roles list in modal */
.saved-roles-list{margin-bottom:18px;}
.saved-role-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;margin-bottom:8px;
}
.saved-role-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--accent);}
.saved-role-cat{font-size:10px;color:var(--muted);margin-top:2px;}
.no-saved{text-align:center;padding:16px;color:var(--muted);font-size:12px;}





</style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <div class="brand">
    <div class="brand-icon">🎯</div>
    <div>
      <div class="brand-name">Talent<span>Trace</span></div>
    </div>
  </div>
  <div class="nav-pill">✦ AI POWERED v3</div>
</nav>

<!-- ── TABS ── -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('builder',this)">⚙️ Query Builder</button>
</div>

<!-- ══════════════════════════════
     TAB 1 — QUERY BUILDER
══════════════════════════════ -->
<div class="panel active" id="panel-builder">

  <div class="grid-2">
    <!-- Role Config -->
    <div class="card">
      <div class="card-head"><div class="card-dot"></div><div class="card-title">Roles</div></div>

      <label>Role Category</label>
      <select id="category" onchange="populateRoles()">
        <option value="">— Select Category —</option>
        <option value="tech">Technology</option>
        <option value="sales">Sales</option>
        <option value="veterans">🎖 Veterans (Indian Defence)</option>
        <option value="custom">⭐ My Custom Roles</option>
      </select>

      <label>Role</label>
      <select id="role"><option value="">— Select Role —</option></select>

      <label>Location</label>
      <input id="location" placeholder="India / Bangalore / Hyderabad">

      <label>Experience Range</label>
      <div class="exp-row">
        <input id="minExp" placeholder="Min  e.g. 3">
        <input id="maxExp" placeholder="Max  e.g. 8">
      </div>
    </div>

    <!-- Talent Filters -->
    <div class="card">
      <div class="card-head"><div class="card-dot"></div><div class="card-title">Talent Filters</div></div>

      <label>Company Cluster</label>
      <select id="cluster">
        <option value="">— None —</option>
        <option value="faang">FAANG</option>
        <option value="unicorn">Indian Unicorns</option>
        <option value="fintech">Fintech</option>
      </select>

      <label>Talent Cluster</label>
      <select id="talentCluster">
        <option value="">— None —</option>
        <option value="blrProduct">Bangalore Product Tech</option>
        <option value="puneProduct">Pune Product Tech</option>
        <option value="startup">Startup Growth</option>
        <option value="enterpriseTech">Enterprise Tech</option>
      </select>

      <label>Education Filter</label>
      <select id="education">
        <option value="">— None —</option>
        <option value="tier1">Tier 1 — IIT / IIM / BITS / NIT</option>
        <option value="tier2">Tier 2 — VIT / SRM / Manipal</option>
        <option value="tier3">Tier 3</option>
      </select>

      <label>Custom Companies (comma separated)</label>
      <input id="companies" placeholder="Microsoft, Amazon">

      <label>Exclude Keywords</label>
      <input id="exclude" placeholder="Intern, Contract">
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="btn-row">
    <button class="btn btn-primary" onclick="generate()">🔍 Run Search</button>
    <button class="btn btn-linkedin" onclick="openLinkedIn()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      LinkedIn
    </button>
    <button class="btn btn-ghost" onclick="openGoogle()">🔍 Google X-Ray</button>
    <button class="btn btn-ghost" style="border-color:rgba(192,132,252,0.3);color:var(--ai);" onclick="openModal()">＋ Add Custom Role</button>
  </div>

  <!-- Outputs -->
  <div class="out-wrap">
    <div class="out-head">
      <span class="out-label">Boolean Query</span>
      <button class="copy-btn" onclick="copyText('output',this)">Copy</button>
    </div>
    <textarea class="out-area" id="output" placeholder="Boolean string appears here after generating..."></textarea>
  </div>
  <div class="out-wrap">
    <div class="out-head">
      <span class="out-label">Google X-Ray</span>
      <button class="copy-btn" onclick="copyText('xray',this)">Copy</button>
    </div>
    <textarea class="out-area" id="xray" placeholder="Google X-Ray string appears here..."></textarea>
  </div>


</div>

<!-- ══════════════════════════════
     CUSTOM ROLE MODAL
══════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">⭐ Manage Custom Roles</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <!-- Saved roles -->
    <div style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;">Saved Roles</div>
    <div class="saved-roles-list" id="saved-roles-list">
      <div class="no-saved">No custom roles yet — add one below.</div>
    </div>

    <div class="divider"></div>

    <!-- Add new role form -->
    <div style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;">Add New Role</div>

    <label>Category</label>
    <select id="new-role-cat">
      <option value="tech">Technology</option>
      <option value="sales">Sales</option>
      <option value="custom">Other</option>
    </select>

    <label>Role Name (display label)</label>
    <input type="text" id="new-role-label" placeholder="e.g. Data Engineer">

    <label>Job Titles (for Boolean — use quotes & OR)</label>
    <textarea class="form-area" id="new-role-titles" placeholder='"Data Engineer" OR "Big Data Engineer" OR "ETL Developer"'></textarea>

    <label>Key Skills (for Boolean — use quotes & OR)</label>
    <textarea class="form-area" id="new-role-skills" placeholder='"Spark" OR "Kafka" OR "Airflow" OR "dbt" OR "Snowflake"'></textarea>

    <div class="status" id="modal-status"></div>

    <div style="display:flex;gap:10px;margin-top:4px;">
      <button class="btn btn-primary" style="flex:1;" onclick="saveCustomRole()">Save Role</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ══════════════════════════════════════════════
// CUSTOM ROLES — localStorage
// ══════════════════════════════════════════════
function getCustomRoles() {
  try { return JSON.parse(localStorage.getItem('customRoles') || '[]'); } catch(e) { return []; }
}
function saveCustomRoles(arr) {
  localStorage.setItem('customRoles', JSON.stringify(arr));
}

function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  renderSavedRoles();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  clearModalForm();
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
function clearModalForm() {
  document.getElementById('new-role-label').value = '';
  document.getElementById('new-role-titles').value = '';
  document.getElementById('new-role-skills').value = '';
  hideStatus('modal-status');
}

function renderSavedRoles() {
  const roles = getCustomRoles();
  const el = document.getElementById('saved-roles-list');
  if (!roles.length) {
    el.innerHTML = '<div class="no-saved">No custom roles yet — add one below.</div>';
    return;
  }
  el.innerHTML = roles.map((r, i) => `
    <div class="saved-role-item">
      <div>
        <div class="saved-role-name">${esc(r.label)}</div>
        <div class="saved-role-cat">${esc(r.category)} · ${esc(r.titles.substring(0,50))}...</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteCustomRole(${i})">Delete</button>
    </div>
  `).join('');
}

function saveCustomRole() {
  const label  = document.getElementById('new-role-label').value.trim();
  const titles = document.getElementById('new-role-titles').value.trim();
  const skills = document.getElementById('new-role-skills').value.trim();
  const cat    = document.getElementById('new-role-cat').value;

  if (!label || !titles || !skills) {
    showStatus('modal-status','error','Please fill in all three fields.');
    return;
  }
  const roles = getCustomRoles();
  roles.push({ label, titles, skills, category: cat, key: 'custom_' + Date.now() });
  saveCustomRoles(roles);
  renderSavedRoles();
  clearModalForm();
  showStatus('modal-status','success','✓ Role saved! Select "My Custom Roles" in the Builder.');
}

function deleteCustomRole(idx) {
  const roles = getCustomRoles();
  roles.splice(idx, 1);
  saveCustomRoles(roles);
  renderSavedRoles();
  populateRoles();
}

// ══════════════════════════════════════════════
// BUILDER
// ══════════════════════════════════════════════
function populateRoles() {
  const category = document.getElementById('category').value;
  const roleSelect = document.getElementById('role');
  roleSelect.innerHTML = '<option value="">— Select Role —</option>';
  if (!category) return;

  let roles = {};
  if (category === 'tech') roles = techRoles;
  else if (category === 'sales') roles = salesRoles;
  else if (category === 'veterans') roles = veteranRoles;
  else if (category === 'custom') {
    getCustomRoles().forEach(r => { roles[r.key] = r; });
  }

  for (let key in roles) {
    const opt = document.createElement('option');
    opt.value = key;
    opt.text = roles[key].label;
    roleSelect.appendChild(opt);
  }
}

function getRoleData(category, key) {
  if (category === 'tech') return techRoles[key];
  if (category === 'sales') return salesRoles[key];
  if (category === 'veterans') return veteranRoles[key];
  if (category === 'custom') return getCustomRoles().find(r => r.key === key);
  return null;
}

function fmtComma(v) {
  if (!v || !v.trim()) return '';
  return '(' + v.split(',').map(x => `"${x.trim()}"`).join(' OR ') + ')';
}

function expandLoc(loc) {
  if (!loc) return '';
  const l = loc.toLowerCase();
  if (l.includes('india')) return '("India" OR "Bangalore" OR "Bengaluru" OR "Hyderabad" OR "Pune" OR "Chennai" OR "Mumbai" OR "Gurgaon" OR "Noida")';
  if (l.includes('bangalore') || l.includes('bengaluru')) return '("Bangalore" OR "Bengaluru")';
  return fmtComma(loc);
}

function expLogic(min, max) {
  if (isNaN(min) || isNaN(max)) return '';
  const arr = [];
  for (let i = min; i <= max; i++) arr.push(`"${i} years"`);
  return '(' + arr.join(' OR ') + ')';
}

function generate() {
  const category = document.getElementById('category').value;
  const roleKey  = document.getElementById('role').value;
  if (!category || !roleKey) { alert('Please select both a category and role.'); return; }

  const rd = getRoleData(category, roleKey);
  if (!rd) { alert('Role data not found.'); return; }

  let q = `(${rd.titles}) AND (${rd.skills})`;
  const loc     = expandLoc(document.getElementById('location').value);
  const exp     = expLogic(parseInt(document.getElementById('minExp').value), parseInt(document.getElementById('maxExp').value));
  const cluster = clusters[document.getElementById('cluster').value];
  const tc      = talentClusters[document.getElementById('talentCluster').value];
  const edu     = educationMap[document.getElementById('education').value];
  const cos     = fmtComma(document.getElementById('companies').value);
  const excl    = fmtComma(document.getElementById('exclude').value);

  if (loc)     q += ` AND ${loc}`;
  if (exp)     q += ` AND ${exp}`;
  if (cluster) q += ` AND (${cluster})`;
  if (tc)      q += ` AND (${tc})`;
  if (edu)     q += ` AND (${edu})`;
  if (cos)     q += ` AND ${cos}`;
  if (excl)    q += ` NOT ${excl}`;

  document.getElementById('output').value = q;
  document.getElementById('xray').value = `site:linkedin.com/in ${q}`;
}

function openLinkedIn() {
  const category = document.getElementById('category').value;
  const roleKey  = document.getElementById('role').value;
  if (!category || !roleKey) { alert('Generate a query first.'); return; }
  const rd = getRoleData(category, roleKey);
  const loc = document.getElementById('location').value.trim();
  const kw = rd.titles + (loc ? ` "${loc}"` : '');
  window.open('https://www.linkedin.com/search/results/people/?keywords=' + encodeURIComponent(kw), '_blank');
}

function openGoogle() {
  const xray = document.getElementById('xray').value;
  if (!xray) { alert('Generate a query first.'); return; }
  window.open('https://www.google.com/search?q=' + encodeURIComponent(xray), '_blank');
}


// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function copyText(id, btn) {
  const val = document.getElementById(id).value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function showStatus(id, type, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'status ' + type;
  el.textContent = msg;
}
function hideStatus(id) {
  const el = document.getElementById(id);
  if (el) { el.className = 'status'; el.textContent = ''; }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
